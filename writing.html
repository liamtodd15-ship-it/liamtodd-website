<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing - Liam Todd</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #fff;
            transition: background-color 0.3s, color 0.3s;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        body.dark-mode { background: #1a1a1a; color: #e0e0e0; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px;
            width: 40px; height: 40px;
            border: 1px solid #e0e0e0;
            background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: border-color 0.3s; z-index: 1000;
        }
        body.dark-mode .theme-toggle { border-color: #404040; }
        .theme-toggle:hover { border-color: #999; }

        header { margin-bottom: 60px; max-width: 650px; }

        h1 { font-size: 28px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.5px; }
        h1 a { color: #1a1a1a; text-decoration: none; transition: color 0.2s; }
        h1 a:hover { color: #666; }
        body.dark-mode h1 a { color: #e0e0e0; }
        body.dark-mode h1 a:hover { color: #999; }

        h2 {
            font-size: 20px; font-weight: 600; margin-bottom: 30px;
            color: #1a1a1a; padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0; display: inline-block;
            transition: color 0.2s, border-color 0.2s;
        }
        h2:hover { color: #000; }
        body.dark-mode h2 { color: #e0e0e0; border-bottom-color: #404040; }
        body.dark-mode h2:hover { color: #fff; }

        nav { margin-top: 30px; }
        nav a {
            color: #666; text-decoration: none; margin-right: 20px; font-size: 15px;
            transition: color 0.2s, border-bottom-color 0.2s;
            border-bottom: 1px solid transparent; padding-bottom: 2px;
        }
        nav a:hover, nav a.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
        body.dark-mode nav a { color: #999; }
        body.dark-mode nav a:hover, body.dark-mode nav a.active { color: #e0e0e0; border-bottom-color: #e0e0e0; }
        .nav-dropdown { position: relative; display: inline-block; margin-right: 20px; }
        .nav-dropdown > a { margin-right: 0; }
        .dropdown-menu { position: absolute; top: 100%; left: 0; padding-top: 6px; display: none; z-index: 100; }
        .nav-dropdown:hover .dropdown-menu { display: block; }
        .dropdown-menu-box { background: transparent; }
        .dropdown-menu a {
            display: block; color: #666; text-decoration: none;
            font-size: 15px; margin-right: 0; padding-bottom: 2px;
            border-bottom: 1px solid transparent; white-space: nowrap;
            transition: color 0.2s, border-bottom-color 0.2s;
        }
        .dropdown-menu a:hover { color: #1a1a1a; border-bottom-color: #1a1a1a; }
        body.dark-mode .dropdown-menu-box { background: transparent; }
        body.dark-mode .dropdown-menu a { color: #999; }
        body.dark-mode .dropdown-menu a:hover { color: #e0e0e0; border-bottom-color: #e0e0e0; }

        .content { margin-bottom: 80px; }

        .writing-cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .writing-card {
            display: flex;
            text-decoration: none;
            color: #1a1a1a;
            padding: 32px;
            border: 1px solid #e0e0e0;
            transition: border-color 0.2s;
            position: relative;
            gap: 32px;
            align-items: stretch;
        }

        .writing-card:hover {
            border: 2px solid #1a1a1a;
            padding: 31px;
        }

        body.dark-mode .writing-card {
            color: #e0e0e0;
            border-color: #404040;
        }

        body.dark-mode .writing-card:hover {
            border-color: #e0e0e0;
        }

        .card-text {
            flex: 0 0 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .writing-card-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .writing-card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        body.dark-mode .writing-card-desc {
            color: #999;
        }

        .writing-card-date {
            font-size: 13px;
            color: #999;
        }

        body.dark-mode .writing-card-date {
            color: #666;
        }

        .card-images {
            flex: 1;
            display: flex;
            gap: 12px;
            min-height: 160px;
        }

        .card-images img {
            flex: 1;
            object-fit: cover;
            border-radius: 4px;
            min-width: 0;
            max-height: 200px;
        }

        .card-images .img-placeholder {
            flex: 1;
            background: #f5f5f5;
            border-radius: 4px;
            min-width: 0;
        }

        body.dark-mode .card-images .img-placeholder {
            background: #2a2a2a;
        }

        footer {
            margin-top: 100px; padding-top: 30px;
            border-top: 1px solid #f0f0f0; font-size: 14px; color: #999; max-width: 650px;
        }
        body.dark-mode footer { border-top-color: #2a2a2a; color: #666; }

        @media (max-width: 768px) {
            .writing-card {
                flex-direction: column;
            }
            .card-text {
                flex: none;
            }
            .card-images {
                min-height: 140px;
            }
        }

        @media (max-width: 600px) {
            body { padding: 40px 20px; }
            .theme-toggle { top: 10px; right: 10px; }
            h1 { font-size: 24px; }
            nav a { display: inline-block; margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <span id="theme-icon">☀️</span>
    </button>

    <header>
        <h1><a href="index.html">Liam Todd</a></h1>
        <nav>
            <div class="nav-dropdown">
                <a href="index.html">About</a>
                <div class="dropdown-menu">
                    <div class="dropdown-menu-box">
                        <a href="cv.html">CV</a>
                    </div>
                </div>
            </div>
            <div class="nav-dropdown">
                <a href="writing.html" class="active">Writing</a>
                <div class="dropdown-menu">
                    <div class="dropdown-menu-box">
                        <a href="life.html">Life</a>
                        <a href="travel.html">Travel</a>
                        <a href="food.html">Food</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="content">
        <h2>Writing</h2>
        <div class="writing-cards">

            <a href="life.html" class="writing-card" id="card-life">
                <div class="card-text">
                    <div class="writing-card-title">Life</div>
                    <div class="writing-card-desc">Thoughts on everyday life and building things</div>
                    <div class="writing-card-date" data-category="life"></div>
                </div>
                <div class="card-images">
                    <img src="images/life-1.jpg" alt="Life">
                    <img src="images/life-2.jpg" alt="Life">
                </div>
            </a>

            <a href="travel.html" class="writing-card" id="card-travel">
                <div class="card-text">
                    <div class="writing-card-title">Travel</div>
                    <div class="writing-card-desc">Stories from around the UK and beyond</div>
                    <div class="writing-card-date" data-category="travel"></div>
                </div>
                <div class="card-images">
                    <img src="images/travel-1.jpg" alt="Travel">
                    <img src="images/travel-2.jpg" alt="Travel">
                </div>
            </a>

            <a href="food.html" class="writing-card" id="card-food">
                <div class="card-text">
                    <div class="writing-card-title">Food</div>
                    <div class="writing-card-desc">Recipes, coffee, and culinary adventures</div>
                    <div class="writing-card-date" data-category="food"></div>
                </div>
                <div class="card-images">
                    <img src="images/food-1.jpg" alt="Food">
                    <img src="images/food-2.jpg" alt="Food">
                </div>
            </a>

        </div>
    </div>

    <footer><p>&copy; 2026 Liam Todd. All rights reserved.</p></footer>

    <script>
        async function loadLatestDates() {
            var categories = ['life', 'travel', 'food'];
            for (var i = 0; i < categories.length; i++) {
                var cat = categories[i];
                var el = document.querySelector('[data-category="' + cat + '"]');
                if (!el) continue;
                try {
                    var res = await fetch('/.netlify/functions/get-posts?category=' + cat);
                    var posts = await res.json();
                    if (posts.length > 0) {
                        var d = new Date(posts[0].date);
                        el.textContent = 'Latest: ' + d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
                    }
                } catch(e) {}
            }
        }

        function toggleTheme() {
            var body = document.body;
            var icon = document.getElementById('theme-icon');
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) { icon.textContent = '🌙'; localStorage.setItem('theme', 'dark'); }
            else { icon.textContent = '☀️'; localStorage.setItem('theme', 'light'); }
        }

        window.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-icon').textContent = '🌙';
            }
            loadLatestDates();
        });
    </script>
</body>
</html>
